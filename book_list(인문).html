  <body

    >

    <!-- 본문 영역: 목록과 필터, 카드 정보를 보여줍니다. -->
    <!-- 본문 영역: 책 카드와 필터를 보여줍니다. -->
<main class="p-8">

        <div class="text-3xl font-bold">책 리스트</div>
        <a

          >+ 기록 작성</a
        >
      </div>

      <!-- 목록 검색창: 제목으로 항목을 다시 좁혀 찾습니다. -->

        class="flex items-center border border-gray-300 rounded-xl px-4 py-3 w-[800px] mb-6 dark:border-gray-700 dark:bg-gray-800"
      >
        <input
          type="text"
          placeholder="책 제목을 검색하세요"
          class="flex-1 outline-none bg-transparent dark:text-white dark:placeholder-gray-500"
        />
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="text-gray-600 dark:text-gray-400"
        >
          <path d="m21 21-4.34-4.34" />
          <circle cx="11" cy="11" r="8" />
        </svg>
      </div>

      <!-- 필터 태그: 장르와 분류를 빠르게 전환합니다. -->
      <div class="flex gap-4 mb-10">
        <a href="./book_list.html">
        <button
          class="px-6 py-2 border border-gray-300 rounded-full cursor-pointer hover:bg-gray-50 dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-800"
        >
          전체
        </button></a>
        <a href="./book_list(소설).html">
        <button
          class="px-6 py-2 border border-gray-300 rounded-full cursor-pointer hover:bg-gray-50 dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-800"
        >
          소설
        </button></a>
        <a href="./book_list(에세이).html">
        <button
          class="px-6 py-2 border border-gray-300 rounded-full cursor-pointer hover:bg-gray-50 dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-800"
        >
          에세이
        </button></a>
        <a href="./book_list(인문).html">
        <button
          class="px-6 py-2 bg-indigo-600 text-white rounded-full cursor-pointer dark:bg-indigo-500"
        >
          인문
        </button></a>
        <a href="./book_list(만화책).html">
        <button
          class="px-6 py-2 border border-gray-300 rounded-full cursor-pointer hover:bg-gray-50 dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-800"

      <!-- 카드 그리드: 16개의 책 항목을 격자 형태로 나열합니다. -->
      <div class="flex flex-wrap gap-x-8 gap-y-10 justify-start">
      
        <div class="w-[150px]">
          <div class="relative w-[150px]">
            <img
              src="./image_book/단테.png"
              class="w-[150px] h-[210px] rounded-lg object-cover shadow-md"
            />
            <svg
              data-id="book-4"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="heart absolute top-2 right-2 text-white drop-shadow-md cursor-pointer"
            >
              <path
                d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"
              />
            </svg>
          </div>
          <div class="pt-3 font-medium truncate">단테</div>
          <div class="text-yellow-500 flex items-center text-sm gap-0.5 mt-0.5">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="currentColor"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"
              /></svg>5.0
          </div>
        </div>

        <div class="w-[150px]">
          <div class="relative w-[150px]">
            <img
              src="./image_book/니체의 초월자.png"
              class="w-[150px] h-[210px] rounded-lg object-cover shadow-md"
            />
            <svg
              data-id="book-8"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="heart absolute top-2 right-2 text-white drop-shadow-md cursor-pointer"
            >
              <path
                d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"
              />
            </svg>
          </div>
          <div class="pt-3 font-medium truncate">니체의 초월자</div>
          <div class="text-yellow-500 flex items-center text-sm gap-0.5 mt-0.5">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="currentColor"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"
              /></svg>4.0
          </div>

      </div>
    </main>

    <script>
      // === 1. 다크모드 토글 로직 ===
      const themeToggle = document.getElementById("theme-toggle");

      // 페이지 로드 시 기존 테마 세팅 확인
      if (
        localStorage.getItem("theme") === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }

      // 테마 변경 버튼 클릭 이벤트
      themeToggle.addEventListener("click", () => {
        document.documentElement.classList.toggle("dark");
        if (document.documentElement.classList.contains("dark")) {
          localStorage.setItem("theme", "dark");
        } else {
          localStorage.setItem("theme", "light");
        }
      });

      // === 2. 하트(좋아요) 저장 로직 ===
      const hearts = document.querySelectorAll(".heart");

      hearts.forEach((heart) => {
        const id = heart.dataset.id;

        // 저장된 상태 불러오기 (라이트/다크 대응 색상 클래스 추가)
        if (localStorage.getItem(id) === "true") {
          heart.classList.add(
            "fill-indigo-600",
            "text-indigo-600",
            "dark:fill-indigo-400",
            "dark:text-indigo-400",
          );
          heart.classList.remove("fill-none");
        } else {
          heart.classList.add("fill-none");
          heart.classList.remove(
            "fill-indigo-600",
            "text-indigo-600",
            "dark:fill-indigo-400",
            "dark:text-indigo-400",
          );
        }

        // 클릭 이벤트 리스너
        heart.addEventListener("click", () => {
          heart.classList.toggle("fill-indigo-600");
          heart.classList.toggle("text-indigo-600");
          heart.classList.toggle("dark:fill-indigo-400");
          heart.classList.toggle("dark:text-indigo-400");
          heart.classList.toggle("fill-none");

          const liked =
            heart.classList.contains("fill-indigo-600") ||
            heart.classList.contains("dark:fill-indigo-400");
          localStorage.setItem(id, liked);
        });
      });
    </script>
  </body>
</html>
