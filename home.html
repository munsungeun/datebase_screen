<script>
  // --- 배너 슬라이드 로직 ---
  const slides = [
    {
      image: "./image_movie/왕사남배너.png",
      title: "왕과 사는 남자",
      desc: "사극, 드라마",
      sub: "1457년 청령포, 역사가 지우려 했던 이야기",
    },
    {
      image: "./image_movie/파묘배너.png",
      title: "파묘",
      desc: "공포, 미스터리, 스릴러, 서스펜스, 퇴마, 오컬트, 드라마, 역사, 크리처",
      sub: "험한 것이 나왔다",
    },
    {
      image: "./image_movie/휴민트배너.png",
      title: "휴민트",
      desc: "첩보, 액션, 범죄, 드라마, 멜로, 스릴러, 느와르",
      sub: "휴민트가 노출되었다 반드시 살려야 한다",
    },
    {
      image: "./image_movie/배테랑배너.png",
      title: "베테랑",
      desc: "액션, 범죄, 형사, 코미디, 미스터리, 스릴러, 사회고발",
      sub: "죄짓고 살지 말라 그랫지?",
    },
  ];

  let current = 0;

  const the_month_work = document.getElementById("the_month_work");
  const title = document.getElementById("title");
  const desc = document.getElementById("desc");
  const sub = document.getElementById("sub");

  setInterval(() => {
    current++;
    if (current >= slides.length) {
      current = 0;
    }
    the_month_work.src = slides[current].image;
    title.textContent = slides[current].title;
    desc.textContent = slides[current].desc;
    sub.textContent = slides[current].sub;
  }, 5000);

  // --- 완벽한 테마 전환 및 저장 로직 ---
  const themeToggle = document.getElementById('theme-toggle');

  themeToggle.addEventListener('click', () => {
    if (document.documentElement.classList.contains('dark')) {
      document.documentElement.classList.remove('dark');
      localStorage.setItem('theme', 'light');
    } else {
      document.documentElement.classList.add('dark');
      localStorage.setItem('theme', 'dark');
    }
  });
  const input = document.getElementById("search");

    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            window.location.href = `검색.html?db=${e.currentTarget.value}`;
        }
    });

    const searchParams = new URLSearchParams(window.location.search);
    input.value = searchParams.get("db");

      const input2 = document.getElementById("search2");

    input2.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            window.location.href = `검색.html?db=${e.currentTarget.value}`;
        }
    });

    input2.value = searchParams.get("db");
</script>
