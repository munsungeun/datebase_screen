  <script>
    const hearts = document.querySelectorAll(".heart");

    hearts.forEach((heart) => {
      const id = heart.dataset.id;

      // 1. 저장된 상태 불러오기
      if (localStorage.getItem(id) === "true") {
        heart.classList.remove("fill-none");
        heart.classList.add("fill-indigo-600"); // 클릭되어 있으면 인디고 색상으로 채움
      } else {
        heart.classList.remove("fill-indigo-600");
        heart.classList.add("fill-none"); // 안 되어 있으면 투명하게
      }

      // 2. 클릭 이벤트 리스너
      heart.addEventListener("click", () => {
        heart.classList.toggle("fill-indigo-600");
        heart.classList.toggle("fill-none");

        const liked = heart.classList.contains("fill-indigo-600");
        localStorage.setItem(id, liked);
      });
    });

    const themeToggle = document.getElementById("theme-toggle");

    themeToggle.addEventListener("click", () => {
      if (document.documentElement.classList.contains("dark")) {
        document.documentElement.classList.remove("dark");
        localStorage.setItem("theme", "light");
      } else {
        document.documentElement.classList.add("dark");
        localStorage.setItem("theme", "dark");
      }
    });
    const input = document.getElementById("search");

    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            window.location.href = `검색.html?db=${e.currentTarget.value}`;
        }
    });

    const searchParams = new URLSearchParams(window.location.search);
    input.value = searchParams.get("db");

      const input2 = document.getElementById("search2");

    input2.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            window.location.href = `검색.html?db=${e.currentTarget.value}`;
        }
    });

    input2.value = searchParams.get("db");
  </script>
