<!doctype html>
<html lang="en" xmlns:dark="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>"
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <style type="text/tailwindcss">
      /* 다크모드를 위한 커스텀 변형 스타일 규칙 정의 */
      @custom-variant dark (&:where(.dark, .dark *));

      /* 외부 서체(서울알림체) 정의 */
      @font-face {
        font-family: "SeoulNotice";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2505-1@1.0/SeoulAlrimTTF-Medium.woff2")
          format("woff2");
        font-weight: 500;
        font-display: swap;
      }

      /* 기본 서체를 Pretendard로 지정 */
      * {
        font-family: "Pretendard Variable";
      }

      /* 서울알림체 클래스 정의 */
      .font-seoul {
        font-family: "SeoulNotice";
      }
    </style>
  </head>

  <body>
    <!-- 검색 화면: 앱 전체의 콘텐츠를 찾는 페이지입니다. -->
    <!-- 상단 내비게이션: 다른 화면으로 이동할 수 있는 공통 메뉴입니다. -->
    <!-- 상단 내비게이션: 홈과 다른 화면으로 이동하는 공통 메뉴입니다. -->
<nav
      class="sticky top-0 h-14 flex items-center justify-between py-4 px-6 border-b border-gray-300 bg-white dark:bg-gray-900 dark:border-gray-800 z-50 transition-colors duration-300"
    >
      <!-- 사이트 로고: 서비스 이름을 보여줍니다. -->
      <h1
        class="text-xl font-bold font-seoul text-indigo-600 dark:text-indigo-400"
      >
        기록 보관소
      </h1>

      <!-- 페이지 이동 메뉴: 홈, 영화, 책, 통계, 기록 작성으로 이동합니다. -->
      <div
        class="flex items-center text-gray-800 dark:text-gray-200 gap-6 text-sm font-medium"
      >
        <a
          href="./home.html"
          class="cursor-pointer px-1 py-2 font-normal hover:font-bold border-b-2 border-transparent hover:text-indigo-400 hover:border-indigo-400 transition-[font-weight,color,border-color] duration-300"
          >홈</a
        >

        <a
          href="./movie_list.html"
          class="cursor-pointer px-1 py-2 font-normal hover:font-bold border-b-2 border-transparent hover:text-indigo-400 hover:border-indigo-400 transition-[font-weight,color,border-color] duration-300"
          >영화</a
        >

        <a
          href="./book_list.html"
          class="cursor-pointer px-1 py-2 font-normal hover:font-bold border-b-2 border-transparent hover:text-indigo-400 hover:border-indigo-400 transition-[font-weight,color,border-color] duration-300"
          >책</a
        >

        <a
          href="./통계 대시보드.html"
          class="cursor-pointer px-1 py-2 font-normal hover:font-bold border-b-2 border-transparent hover:text-indigo-400 hover:border-indigo-400 transition-[font-weight,color,border-color] duration-300"
          >통계</a
        >

        <button
          class="cursor-pointer px-1 py-2 font-normal hover:font-bold border-b-2 border-transparent hover:text-indigo-400 hover:border-indigo-400 transition-[font-weight,color,border-color] duration-300"
        >
          기록 작성
        </button>

        <!-- 도구 영역: 검색창, 테마 전환, 계정 아이콘을 배치합니다. -->
      </div>
      <div class="flex items-center gap-4">
        <div
          class="flex justify-center w-80 px-4 py-1 bg-white border border-gray-300 rounded-full shadow-md dark:bg-gray-800 dark:border-gray-700 dark:shadow-none transition-colors duration-300"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="text-gray-600 dark:text-gray-400"
          >
            <path d="m21 21-4.34-4.34" />
            <circle cx="11" cy="11" r="8" />
          </svg>
          <input
            id="search"
            type="text"
            placeholder="검색"
            class="flex-1 pl-2 outline-none bg-transparent dark:text-white dark:placeholder-gray-500"
          />
        </div>

        <button
          id="theme-toggle"
          class="cursor-pointer focus:outline-none flex items-center justify-center p-1"
          aria-label="테마 변경"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="text-gray-600 hover:text-indigo-500 dark:hidden transition-colors"
          >
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="hidden dark:block text-gray-400 hover:text-indigo-400 transition-colors"
          >
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="m4.93 4.93 1.41 1.41" />
            <path d="m17.66 17.66 1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="m6.34 17.66-1.41 1.41" />
            <path d="m19.07 4.93-1.41 1.41" />
          </svg>
        </button>

        <!-- 계정 아이콘: 로그인 화면 또는 마이페이지로 연결됩니다. -->
        <a href="./로그인.html" class="size-8 text-gray-700 dark:text-gray-300">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="hover:text-indigo-600 dark:hover:text-indigo-400"
          >
            <path d="M17.925 20.056a6 6 0 0 0-11.851.001" />
            <circle cx="12" cy="11" r="4" />
            <circle cx="12" cy="12" r="10" />
          </svg>
        </a>
      </div>
    </nav>
    
    <!-- 본문 영역: 검색 결과와 관련 콘텐츠를 표시합니다. -->
<main class="space-y-7 px-80 max-lg:px-32 pt-10">
      <div class="flex flex-col gap-2">
        <div class="font-bold text-3xl">검색 결과</div>
        <div class="text-gray-600">총 결과</div>
      </div>
      <div
        id="list"
        class="flex flex-wrap gap-x-8 gap-y-10 justify-start px-2"
      ></div>
    </main>
  </body>
  <!-- 스크립트 영역: 검색어를 읽어 결과를 불러옵니다. -->
<script>
    // 검색창 요소 가져오기
    const input = document.getElementById("search");

    // 검색창에서 엔터를 누르면 검색 페이지로 이동
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        // 입력한 검색어를 url 파라미터로 전달
        window.location.href = `검색.html?db=${e.currentTarget.value}`;
      }
    });

    // 현재 url의 검색어 가져오기
    const searchParams = new URLSearchParams(window.location.search);
    // 검색창에 현재 검색어 표시
    input.value = searchParams.get("db");

    // 검색 결과를 출력할 영역 가져오기
    const workList = document.getElementById("list");

    // json 파일에서 작품 데이터 불러오기
    fetch(`${window.location.origin}/works.json`)
      .then((res) => res.json())
      .then((json) => {

        // 검색어가 포함된 작품만 필터링
        json.data
          .filter((E) => {
            return E.includes(searchParams.get("db"));
          })

          // 검색 결과를 화면에 출력
          .forEach((e) => {
            workList.insertAdjacentHTML(
              "beforeend",
              `
<div class="w-[150px]">
  <div class="relative w-[150px]">
    <img
            src="./images/${e}.png"
            class="w-[150px] h-[210px] rounded-lg object-cover shadow-md"
    />
  </div>
  <div class="pt-3 font-medium truncate">${e}</div>
  <div class="text-yellow-500 flex items-center text-sm gap-0.5 mt-0.5">
    <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="currentColor"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
    >
      <path
              d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"
      />
    </svg>
    // 임의의 평점 생성
    ${Math.ceil(Math.random() * 50) / 10}
  </div>
</div>
`,
            );
          });
      });
  </script>
</html>
