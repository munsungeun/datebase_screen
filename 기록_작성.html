  <!-- 상단 내비게이션: 다른 화면으로 이동할 수 있는 공통 메뉴입니다. -->

      <!-- 페이지 이동 메뉴: 홈, 영화, 책, 통계, 기록 작성으로 이동합니다. -->

        <a href="./book_list.html" class="cursor-pointer px-1 py-2 font-normal hover:font-bold border-b-2 border-transparent hover:text-indigo-400 hover:border-indigo-400 transition-[font-weight,color,border-color] duration-300">책</a>

        <a href="./통계 대시보드.html" class="cursor-pointer px-1 py-2 font-normal hover:font-bold border-b-2 border-transparent hover:text-indigo-400 hover:border-indigo-400 transition-[font-weight,color,border-color] duration-300">통계</a>

        <button class="px-1 py-2 text-indigo-600 dark:text-indigo-400 font-bold border-b-2 border-indigo-600 dark:border-indigo-400 cursor-pointer">기록 작성</button>

        <!-- 도구 영역: 검색창, 테마 전환, 계정 아이콘을 배치합니다. -->
      </div>
      <div class="flex items-center gap-4">
        <div class="flex justify-center w-80 px-4 py-1 bg-white border border-gray-300 rounded-full shadow-md dark:bg-gray-800 dark:border-gray-700 dark:shadow-none transition-colors duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-600 dark:text-gray-400">
            <path d="m21 21-4.34-4.34" />
            <circle cx="11" cy="11" r="8" />
          </svg>
          <input id="search" type="text" placeholder="검색" class="flex-1 pl-2 outline-none bg-transparent dark:text-white dark:placeholder-gray-500"/>
        </div>

        <button id="theme-toggle" class="cursor-pointer focus:outline-none flex items-center justify-center p-1" aria-label="테마 변경">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-600 hover:text-indigo-500 dark:hidden transition-colors">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden dark:block text-gray-400 hover:text-indigo-400 transition-colors">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="m4.93 4.93 1.41 1.41" />
            <path d="m17.66 17.66 1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="m6.34 17.66-1.41 1.41" />
            <path d="m19.07 4.93-1.41 1.41" />
          </svg>
        </button>

        <!-- 계정 아이콘: 로그인 화면 또는 마이페이지로 연결됩니다. -->
        <a href="./로그인.html" class="size-8 text-gray-700 dark:text-gray-300">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="hover:text-indigo-600 dark:hover:text-indigo-400">
            <path d="M17.925 20.056a6 6 0 0 0-11.851.001" />

    <!-- 본문 영역: 기록 입력 폼을 배치합니다. -->
<main>
      <div class="max-w-6xl mx-auto p-8">
        <h1 class="text-3xl font-bold text-indigo-600 dark:text-indigo-400 pb-10 transition-colors duration-300">기록 작성</h1>
        
        <div class="flex gap-10">
          <!-- 왼쪽 입력 패널: 기록의 기본 정보를 입력합니다. -->
<div class="w-[320px]">
            <div class="pb-8">
              <label class="block font-bold pb-3">카테고리</label>
              <div class="flex gap-3">
                <button class="category px-8 py-2 border border-gray-300 rounded-lg cursor-pointer transition-colors dark:border-gray-700 dark:text-gray-300 ">영화</button>
                <button class="category px-8 py-2 border border-gray-300 rounded-lg cursor-pointer transition-colors dark:border-gray-700 dark:text-gray-300 ">책</button>
              </div>
            </div>

            <div class="pb-6">
              <label class="block font-bold pb-2">제목</label>
              <input type="text" placeholder="제목을 입력하세요" class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none transition-colors dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:placeholder-gray-500 focus:border-indigo-500 dark:focus:border-indigo-400" />
            </div>

            <div class="pb-6">
              <label class="block font-semibold pb-2">날짜</label>
              <input type="date" class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none transition-colors dark:border-gray-700 dark:bg-gray-800 dark:text-white focus:border-indigo-500 dark:focus:border-indigo-400" />
            </div>

            <div class="pb-6">
              <label class="block font-semibold pb-2">장르</label>
              <select class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none transition-colors dark:border-gray-700 dark:bg-gray-800 dark:text-white focus:border-indigo-500 dark:focus:border-indigo-400">
                <option>장르 선택</option>
                <option>액션</option>
                <option>드라마</option>
                <option>코미디</option>
                <option>로맨스</option>
              </select>
            </div>

            <div class="pb-6">
              <label class="block font-bold pb-3">별점</label>
              <div id="stars" class="flex gap-2 text-2xl text-indigo-600 dark:text-indigo-400 font-bold transition-colors duration-300">
                <div class="star cursor-pointer">☆</div>
                <div class="star cursor-pointer">☆</div>
                <div class="star cursor-pointer">☆</div>
                <div class="star cursor-pointer">☆</div>
                <div class="star cursor-pointer">☆</div>
              </div>
            </div>

            <div class="mb-8">
              <label class="block font-semibold mb-2">기타 메모 (선택)</label>
              <input type="text" placeholder="간단한 메모를 입력하세요 (선택)" class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none transition-colors dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:placeholder-gray-500 focus:border-indigo-500 dark:focus:border-indigo-400" />
            </div>

            <a href="./home.html">
              <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-lg font-bold dark:bg-indigo-500 dark:hover:bg-indigo-600 transition-colors cursor-pointer">저장하기</button>
            </a>
          </div>

          <!-- 오른쪽 메모 패널: 긴 설명을 자유롭게 적습니다. -->
<div class="flex-1">
            <label class="block font-bold pb-3">감상문</label>
            <textarea placeholder="작품에 대한 감상을 자유롭게 작성해주세요." class="w-full h-[520px] border border-gray-300 rounded-lg p-4 resize-none outline-none transition-colors dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:placeholder-gray-500 focus:border-indigo-500 dark:focus:border-indigo-400"></textarea>
          </div>
        </div>
      </div>
    </main>

<!-- 스크립트 영역: 테마 상태와 별점 선택 동작을 처리합니다. -->
<script>
// 다크모드 기능

// 테마 변경 버튼 가져오기
const themeToggle = document.getElementById('theme-toggle');

//  저장된 테마 설정 확인
// 저장된 값이 dark 거나 시스템 설정이 다크모드라면 다크모드 적용
if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  document.documentElement.classList.add('dark');
} else {
  document.documentElement.classList.remove('dark');
}

// 테마 변경 버튼 클릭 시 다크모드/라이트모드 전환
themeToggle.addEventListener('click', () => {

  // html 태그에 dark 클래스 추가 또는 제거
  document.documentElement.classList.toggle('dark');

  // 현재 상태를 localStorage에 저장, 새로고침 후에도 유지
  if (document.documentElement.classList.contains('dark')) {
    localStorage.setItem('theme', 'dark');
  } else {
    localStorage.setItem('theme', 'light');
  }
});

// 별점 기능

// 모든 별 요소 가져오기
const stars = document.querySelectorAll(".star");

// 각 별에 클릭 이벤트 등록
stars.forEach((star, index) => {
  star.addEventListener("click", () => {
    
    // 클릭된 별 위치까지 채워진 별로 표시
    stars.forEach((s, i) => {
      
      if (i <= index) {
        s.textContent = "★";
        s.classList.add("text-yellow-400");
      } else {
        
        // 나머지 별은 빈 별로 초기화
        s.textContent = "☆";
        s.classList.remove("text-yellow-400");
      }
    });
  });
});

// 카테고리 선택 기능

// 영화, 책 카테고리 버튼 가져오기
const categories = document.querySelectorAll(".category");

// 각 버튼에 클릭 이벤트 등록
categories.forEach(btn => {
 
  btn.addEventListener("click", () => {

   // 모든 버튼의 선택 상태 제거
    categories.forEach(c => {
      c.classList.remove("bg-indigo-600", "text-white", "dark:bg-indigo-500");
    });

    // 현재 클릭한 버튼만 선택 상태로 변경
    btn.classList.add("bg-indigo-600", "text-white", "dark:bg-indigo-500");
  });
});

// 검색 기능

// 검색 입력창 가져오기
const input = document.getElementById("search");

    // 엔터 키 입력 시 검색 페이지로 이동
    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {

            // 입력한 검색어를 url 파라미터로 전달
            window.location.href = `검색.html?db=${e.currentTarget.value}`;
        }
    });
    
    // url에 저장된 검색어 가져오기
    const searchParams = new URLSearchParams(window.location.search);

    // 검색창에 검색어 표시
    input.value = searchParams.get("db");

</script>
</body>
</html>
