       <button class="px-1 py-2 text-indigo-600 font-bold border-b-2 border-indigo-600">기록 작성</button>
      </div>

    <main>
       <div class="max-w-6xl mx-auto p-8">
  <h1 class="text-4xl font-bold text-indigo-600 pb-10">
    기록 작성
  </h1>
  <div class="flex gap-10">
    <div class="w-[320px]">
      <div class="pb-8">
        <label class="block font-bold pb-3">카테고리</label>

        <div class="flex gap-3">
          <button
            class="category px-8 py-2 border border-gray-300 rounded-lg"
          >
            영화
          </button>

          <button
            class="category px-8 py-2 border border-gray-300 rounded-lg"
          >
            책
          </button>
        </div>
      </div>

      <div class="pb-6">
        <label class="block font-bold pb-2">제목</label>

        <input
          type="text"
          placeholder="제목을 입력하세요"
          class="w-full  border border-gray-300 rounded-lg px-4 py-3 outline-none"
        />
      </div>

      <div class="pb-6">
        <label class="block font-semibold pb-2">날짜</label>

        <input
          type="date"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none"
        />
      </div>

      <div class="pb-6">
        <label class="block font-semibold pb-2">장르</label>

        <select
          class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none"
        >
          <option>장르 선택</option>
          <option>액션</option>
          <option>드라마</option>
          <option>코미디</option>
          <option>로맨스</option>
        </select>
      </div>

      <!-- 별점 -->
      <div class="pb-6">
  <label class="block font-bold pb-3">별점</label>

  <div id="stars" class="flex gap-2 text-2xl text-indigo-600 font-bold">
    <div class="star cursor-pointer">☆</div>
    <div class="star cursor-pointer">☆</div>
    <div class="star cursor-pointer">☆</div>
    <div class="star cursor-pointer">☆</div>
    <div class="star cursor-pointer">☆</div>
  </div>
</div>

      <!-- 메모 -->
      <div class="mb-8">
        <label class="block font-semibold mb-2">
          기타 메모 (선택)
        </label>

        <input
          type="text"
          placeholder="간단한 메모를 입력하세요 (선택)"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none"
        />
      </div>

      <!-- 저장 -->
       <a href="./home.html">
      <button
        class="w-full bg-indigo-600 text-white py-4 rounded-lg font-bold hover:bg-indigo-700"
      >
        저장하기
      </button></a>
    </div>

    <!-- 오른쪽 -->
    <div class="flex-1">
      <label class="block font-bold pb-3">
        감상문
      </label>

      <textarea
        placeholder="작품에 대한 감상을 자유롭게 작성해주세요."
        class="w-full h-[520px] border border-gray-300 rounded-lg p-4 resize-none outline-none"
      ></textarea>
    </div>
  </div>
</div>
    </main>
</body>
</html>
<script>
const stars = document.querySelectorAll(".star");

stars.forEach((star, index) => {
  star.addEventListener("click", () => {

    stars.forEach((s, i) => {
      if (i <= index) {
        s.textContent = "★";
        s.classList.add("text-yellow-400");
      } else {
        s.textContent = "☆";
        s.classList.remove("text-yellow-400");
      }
    });

  });
});
const categories = document.querySelectorAll(".category");
categories.forEach(btn => {
  btn.addEventListener("click", () => {
    categories.forEach(c => {
      c.classList.remove("bg-indigo-600", "text-white");
    });

    btn.classList.add("bg-indigo-600", "text-white");
  });
});
</script>
