<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <style>
      @font-face {
        font-family: "SeoulNotice";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2505-1@1.0/SeoulAlrimTTF-Medium.woff2")
          format("woff2");
        font-weight: 500;
        font-display: swap;
      }
      .font-seoul {
        font-family: "seoulNotice" !important;
      }
    </style>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔒</text></svg>"
    />
    <title>로그인</title>
  </head>
  <body class="font-[Pretendard_Variable]">
    <header class="bg-indigo-200">
      <div class="flex justify-center py-16">
        <div class="flex flex-col justify-center">
          <div
            class="border border-gray-300 rounded-xl w-[500px] h-[650px] shadow-xl bg-white p-4"
          >
            <div
              class="text-3xl p-3 font-bold pt-5 text-center text-gray-600 font-seoul"
            >
              로그인
            </div>

            <div class="flex flex-col justify-center p-2">
              <div class="text-lg pl-4 pt-6">아이디</div>
              <input
                type="tel"
                placeholder="아이디를 입력하세요."
                class="border rounded-lg border-gray-300 py-4 px-4 text-lg"
              />

              <div class="text-lg pt-7 pl-4">비밀번호</div>
              <input
                type="password"
                placeholder="비밀번호를 입력하세요."
                class="border rounded-lg border-gray-300 py-4 px-4 text-lg"
              />

              <div class="flex pt-4">
                <input type="checkbox" class="w-5" />
                <div class="pl-2 text-base">로그인 상태 유지</div>
              </div>

              <a href="./home.html">
                <div
                  class="rounded-xl text-center border-none bg-indigo-500 text-white py-4 text-xl font-bold shadow-lg mt-6 mb-6"
                >
                  로그인
                </div></a
              >

              <div
                class="flex gap-3 justify-center text-base pb-7 text-gray-600"
              >
                <div>아이디 찾기</div>
                <div>|</div>
                <div>비밀번호 찾기</div>
              </div>

              <div
                class="border rounded-xl text-center border-indigo-500 py-4 text-indigo-600 text-xl font-bold shadow-lg"
              >
                회원가입
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
