<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <style>
      @font-face {
        font-family: "SeoulNotice";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2505-1@1.0/SeoulAlrimTTF-Medium.woff2")
          format("woff2");
        font-weight: 500;
        font-display: swap;
      }
      .font-seoul {
        font-family: "seoulNotice" !important;
      }
    </style>
    <title>Document</title>
  </head>
  <body class="font-[Pretendard_Variable]">
    <header>
      <div class="min-h-screen bg-center bg-[#ECE0D7]">
        <div class="flex justify-center p-40">
          <div class="flex flex-col justify-center shdow-xl mt-0">
            <div
              class="border border-gray-300 rounded-xl max-md:w-full max-md:mx-8 w-[600px] h-[800px] mx-auto shadow-xl border-gray-300 bg-white p-4"
            >
              <div
                class="text-4xl p-3 font-bold pt-5 text-center text-neutral-700 font-seoul"
              >
                로그인
              </div>

              <div class="flex flex-col justify-center p-2">
                <div class="text-xl pl-4 pt-8">아이디</div>
                <input
                  type="tel"
                  placeholder="아이디를 입력하세요."
                  class="flex flex-col border rounded-lg border-gray-300 p-5 text-lg"
                />
                <div class="text-xl pt-9 pl-4">비밀번호</div>
                <input
                  type="tel"
                  placeholder="비밀번호를 입력하세요."
                  class="flex flex-col border rounded-lg border-gray-300 p-5 text-lg"
                />
                <div class="flex pt-4">
                  <input type="checkbox" class="w-5 pl-3" />
                  <div class="p-10 pl-2 text-lg">로그인 상태 유지</div>
                </div>
                <div
                  class="border rounded-xl text-center border-none bg-indigo-500 text-white p-5 text-2xl font-bold shadow-lg mb-8"
                >
                  로그인
                </div>
                <div
                  class="flex gap-3 justify-center text-lg p-5 pb-9 text-gray-600"
                >
                  <div>아이디 찾기</div>
                  <div>|</div>
                  <div>비밀번호 찾기</div>
                </div>
                <div
                  class="border rounded-xl text-center border-indigo-500 p-5 text-indigo-600 text-2xl font-bold mb-8 shadow-lg"
                >
                  회원가입
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
